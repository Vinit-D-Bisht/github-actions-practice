name: Hello GitHub Actions

on:
  push:
    branches: [main]

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Say Hello
        run: echo "Hello from GitHub Actions!"

      - name: Print date and time
        run: date

      - name: Print branch name
        run: |
          echo Branch:
          echo $GITHUB_REF_NAME

      - name: List files
        run: ls -la

      - name: Runner OS
        run: uname -a
